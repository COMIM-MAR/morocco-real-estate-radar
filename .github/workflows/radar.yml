name: Morocco Real Estate Intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

concurrency:
  group: morocco-real-estate-intelligence
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore Meta storage state
        if: ${{ secrets.META_STORAGE_STATE_JSON_B64 != '' }}
        run: |
          mkdir -p secrets
          echo "${{ secrets.META_STORAGE_STATE_JSON_B64 }}" | base64 --decode > secrets/meta-storage-state.json

      - name: Run intelligence engine
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          META_COLLECTOR_MODE: playwright
          META_PLAYWRIGHT_HEADLESS: "1"
          META_STORAGE_STATE_PATH: secrets/meta-storage-state.json
        run: python run.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs || true
          git diff --cached --quiet || git commit -m "Update intelligence data and dashboard"
          git pull --rebase origin main
          git push
